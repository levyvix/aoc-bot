# Replay-test against a past AoC year (default: 2025).

name: Test Replay (2025)

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Event year to replay"
        required: true
        default: "2025"
        type: string
      day:
        description: "Day to solve (1–12 for 2025)"
        required: true
        default: "1"
        type: string
      dry_run:
        description: "Part 1 only — agent must not submit"
        required: true
        default: true
        type: boolean

concurrency:
  group: aoc-test-${{ github.event.inputs.year }}-${{ github.event.inputs.day }}
  cancel-in-progress: true

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      AOC_YEAR: ${{ github.event.inputs.year }}
      AOC_DAY: ${{ github.event.inputs.day }}
      AOC_DRY_RUN: ${{ github.event.inputs.dry_run == true && 'true' || '' }}
      AOC_SKIP_COMMIT: "true"
      AOC_SESSION: ${{ secrets.AOC_SESSION }}
      CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'composer-2.5' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Solve day
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: uv run aoc solve-day

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoc-replay-${{ github.event.inputs.year }}-day-${{ github.event.inputs.day }}
          path: |
            .aoc/
            solutions/
