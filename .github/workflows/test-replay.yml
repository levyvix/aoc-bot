# Replay-test the full pipeline against a past AoC year (default: 2025).
# Part 2 only runs after Part 1 is submitted and unlocks on adventofcode.com.

name: Test Replay (2025)

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Event year to replay"
        required: true
        default: "2025"
        type: string
      day:
        description: "Day to solve (1–12 for 2025)"
        required: true
        default: "1"
        type: string
      dry_run:
        description: "Part 1 only — solve but do not submit (Part 2 needs submit)"
        required: true
        default: true
        type: boolean
      submit:
        description: "Full run: submit Part 1, unlock Part 2, solve and submit Part 2"
        required: false
        default: false
        type: boolean

concurrency:
  group: aoc-test-${{ github.event.inputs.year }}-${{ github.event.inputs.day }}
  cancel-in-progress: true

jobs:
  replay:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      AOC_YEAR: ${{ github.event.inputs.year }}
      AOC_DAY: ${{ github.event.inputs.day }}
      CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'composer-2.5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # ── Phase 1: Part 1 only (Part 2 is locked on AoC) ──
      - name: Prepare puzzle artifacts
        env:
          AOC_SESSION: ${{ secrets.AOC_SESSION }}
        run: uv run python scripts/prepare_day.py

      - name: Render Part 1 prompt
        run: uv run python scripts/render_prompt.py --part 1

      - name: Solve Part 1 (with retries)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AOC_SESSION: ${{ secrets.AOC_SESSION }}
          AOC_MAX_ATTEMPTS: ${{ vars.AOC_MAX_ATTEMPTS || '3' }}
        run: bash scripts/solve_part.sh 1 ${{ github.event.inputs.submit == true && 'true' || 'false' }}

      - name: Refresh puzzle (unlock Part 2)
        if: ${{ github.event.inputs.submit == true }}
        env:
          AOC_SESSION: ${{ secrets.AOC_SESSION }}
        run: uv run python scripts/refresh_part2.py

      - name: Render Part 2 prompt
        if: ${{ github.event.inputs.submit == true }}
        run: uv run python scripts/render_prompt.py --part 2

      - name: Solve Part 2 (with retries)
        if: ${{ github.event.inputs.submit == true }}
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          AOC_SESSION: ${{ secrets.AOC_SESSION }}
          AOC_MAX_ATTEMPTS: ${{ vars.AOC_MAX_ATTEMPTS || '3' }}
        run: bash scripts/solve_part.sh 2 true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoc-replay-${{ github.event.inputs.year }}-day-${{ github.event.inputs.day }}
          path: |
            .aoc/
            solutions/
