name: AoC Daily Solve

# Runs at 05:00 UTC (midnight US Eastern). Days past the event finale (12 for 2025+, 25 before) exit cleanly.
on:
  schedule:
    - cron: "0 5 1-25 12 *"
  workflow_dispatch:
    inputs:
      day:
        description: "AoC day override (1–25)"
        required: false
        type: string
      year:
        description: "AoC year override"
        required: false
        type: string
      dry_run:
        description: "Part 1 only — agent must not submit"
        required: false
        type: boolean
        default: false
      skip_commit:
        description: "Do not commit solution to repo"
        required: false
        type: boolean
        default: false

concurrency:
  group: aoc-solve-${{ github.event.inputs.day || 'scheduled' }}
  cancel-in-progress: false

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      AOC_YEAR: ${{ github.event.inputs.year || vars.AOC_YEAR || '2026' }}
      AOC_DAY: ${{ github.event.inputs.day }}
      AOC_DRY_RUN: ${{ github.event.inputs.dry_run == true && 'true' || '' }}
      AOC_SKIP_COMMIT: ${{ github.event.inputs.skip_commit == true && 'true' || '' }}
      AOC_SESSION: ${{ secrets.AOC_SESSION }}
      CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'composer-2.5' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Solve day
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: uv run aoc solve-day

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoc-day-${{ github.run_id }}
          path: |
            .aoc/
            solutions/
