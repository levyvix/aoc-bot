name: AoC Daily Solve

on:
  schedule:
    - cron: "0 5 1-25 12 *"
  workflow_dispatch:
    inputs:
      day:
        description: "AoC day override (1–25)"
        required: false
        type: string
      year:
        description: "AoC year override"
        required: false
        type: string
      dry_run:
        description: "Part 1 only — agent must not submit"
        required: false
        type: boolean
        default: false
      skip_commit:
        description: "Do not commit solution to repo"
        required: false
        type: boolean
        default: false

concurrency:
  group: aoc-solve-${{ github.event.inputs.day || 'scheduled' }}
  cancel-in-progress: false

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      AOC_YEAR: ${{ github.event.inputs.year || vars.AOC_YEAR || '2026' }}
      AOC_DAY: ${{ github.event.inputs.day }}
      AOC_DRY_RUN: ${{ github.event.inputs.dry_run == true && 'true' || '' }}
      AOC_SESSION: ${{ secrets.AOC_SESSION }}
      CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'composer-2.5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Prepare day and render agent prompt
        run: |
          uv run python scripts/aoc_tool.py prepare
          echo "AOC_DAY=$(jq -r .day .aoc/meta.json)" >> "$GITHUB_ENV"
          uv run python scripts/aoc_tool.py assert-day
          uv run python scripts/render_prompt.py

      - name: Run autonomous agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: bash scripts/run_cursor_agent.sh .aoc/prompt.md .aoc/agent-output.md

      - name: Post-agent check
        run: uv run python scripts/final_check.py

      - name: Commit solutions
        if: ${{ success() && github.event.inputs.skip_commit != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          YEAR=$(jq -r .year .aoc/meta.json)
          DAY=$(jq -r .day .aoc/meta.json)
          git add "solutions/${YEAR}/${DAY}/"
          git diff --staged --quiet || git commit -m "aoc: ${YEAR} day ${DAY} solutions"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoc-day-${{ github.run_id }}
          path: |
            .aoc/
            solutions/
